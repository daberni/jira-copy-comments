name: Release to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after upload"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          for var in EXTENSION_ID PUBLISHER_ID WORKLOAD_IDENTITY_PROVIDER SERVICE_ACCOUNT; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Build extension zip from src/
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.version' src/manifest.json)"
          ZIP_NAME="jira-clipboard-helper-${VERSION}.zip"

          mkdir -p dist
          rm -f "dist/${ZIP_NAME}"

          (
            cd src
            zip -r "../dist/${ZIP_NAME}" .
          )

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Created dist/${ZIP_NAME}"

      - name: Upload package to Chrome Web Store
        shell: bash
        run: |
          set -euo pipefail
          UPLOAD_RESPONSE="$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -T "dist/${ZIP_NAME}" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:upload")"

          echo "$UPLOAD_RESPONSE" | jq .

          UPLOAD_STATE="$(echo "$UPLOAD_RESPONSE" | jq -r '.uploadState // empty')"
          if [ "$UPLOAD_STATE" != "SUCCESS" ]; then
            echo "Upload did not succeed"
            exit 1
          fi

      - name: Publish item
        if: ${{ github.event.inputs.publish == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_RESPONSE="$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:publish")"

          echo "$PUBLISH_RESPONSE" | jq .

      - name: Create and push git tag
        if: ${{ github.event.inputs.publish == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.version' src/manifest.json)"
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally"
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists on origin"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"

      - name: Fetch item status
        shell: bash
        run: |
          set -euo pipefail
          STATUS_RESPONSE="$(curl -sS \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}")"

          echo "$STATUS_RESPONSE" | jq .
