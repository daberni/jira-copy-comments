name: Release to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after upload"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          for var in EXTENSION_ID PUBLISHER_ID WORKLOAD_IDENTITY_PROVIDER SERVICE_ACCOUNT; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Build extension zip
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-target.sh chrome

          VERSION="$(jq -r '.version' targets/chrome/manifest.json)"
          ZIP_NAME="jira-clipboard-helper-chrome-${VERSION}.zip"

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Created dist/${ZIP_NAME}"

      - name: Upload package to Chrome Web Store
        shell: bash
        run: |
          set -euo pipefail
          UPLOAD_RESPONSE="$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -T "dist/${ZIP_NAME}" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:upload")"

          echo "$UPLOAD_RESPONSE" | jq .

          UPLOAD_STATE="$(echo "$UPLOAD_RESPONSE" | jq -r '.uploadState // empty')"
          if [ "$UPLOAD_STATE" != "SUCCEEDED" ]; then
            echo "Upload did not succeed"
            exit 1
          fi

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v7
        with:
          name: chrome-addon-${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Publish item
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_RESPONSE="$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:publish")"

          echo "$PUBLISH_RESPONSE" | jq .

      - name: Fetch item status
        shell: bash
        run: |
          set -euo pipefail
          STATUS_RESPONSE="$(curl -sS \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:fetchStatus")"
          echo "$STATUS_RESPONSE" | jq .
